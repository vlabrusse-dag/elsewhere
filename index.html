<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elsewhere — Discover the road less travelled</title>
<meta name="description" content="Enter a famous tourist spot. We suggest a hidden gem nearby." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #1a1a18;
    --paper: #f5f2eb;
    --paper-dark: #ede9df;
    --sage: #7a9e87;
    --sage-light: #b8d4c0;
    --rust: #b85c3a;
    --muted: #8a8578;
    --border: rgba(26,26,24,0.12);
    --radius: 4px;
    --radius-lg: 10px;
    /* Seasonal overrides */
    --season-paper: #f5f2eb;
    --season-paper-dark: #ede9df;
    --season-accent: #7a9e87;
    --season-accent-light: #b8d4c0;
    --season-ink: #1a1a18;
    --season-muted: #8a8578;
    --season-badge-bg: #7a9e87;
    --season-badge-text: #fff;
    --season-like: #b85c3a;
  }

  /* Apply seasonal vars */
  body {
    background: var(--season-paper) !important;
    transition: background 1.2s ease, color 0.8s ease;
  }
  .logo span { color: var(--season-accent) !important; }
  .card-badge { background: var(--season-badge-bg) !important; color: var(--season-badge-text) !important; }
  .search-field:focus { border-color: var(--season-accent) !important; box-shadow: 0 4px 30px rgba(0,0,0,0.08) !important; }
  .search-btn:hover { background: var(--season-accent) !important; }
  .crowd-dot.on { background: var(--season-accent) !important; }
  .card-chip { background: var(--season-paper-dark) !important; }
  .like-btn.liked { background: var(--season-like) !important; border-color: var(--season-like) !important; }
  .example-chip:hover { border-color: var(--season-accent) !important; color: var(--season-accent) !important; background: rgba(0,0,0,0.03) !important; }
  .hero-eyebrow { color: var(--season-accent) !important; }
  h1 em { color: var(--season-accent) !important; }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE TEXTURE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  /* ── HEADER ── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 2.5rem;
    background: rgba(245,242,235,0.88);
    backdrop-filter: blur(12px);
    border-bottom: 0.5px solid var(--border);
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
  }
  .logo span { color: var(--sage); }

  .lang-selector {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .lang-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: var(--muted);
    padding: 4px 8px;
    border-radius: var(--radius);
    transition: color 0.2s, background 0.2s;
    text-transform: uppercase;
  }
  .lang-btn:hover, .lang-btn.active {
    color: var(--ink);
    background: var(--paper-dark);
  }
  .lang-btn.active { color: var(--ink); font-weight: 500; }

  /* ── HERO ── */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8rem 2rem 4rem;
    text-align: center;
    z-index: 1;
  }

  /* Decorative compass rose */
  .compass-bg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    opacity: 0.035;
    pointer-events: none;
  }

  .hero-eyebrow {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 1.5rem;
    font-weight: 400;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(52px, 9vw, 96px);
    font-weight: 300;
    line-height: 0.95;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin-bottom: 1.25rem;
  }
  h1 em {
    font-style: italic;
    color: var(--sage);
  }

  .hero-sub {
    font-size: 15px;
    color: var(--muted);
    max-width: 400px;
    line-height: 1.7;
    margin-bottom: 3rem;
    font-weight: 300;
  }

  /* ── SEARCH ── */
  .search-wrap {
    width: 100%;
    max-width: 560px;
    position: relative;
  }

  .search-field {
    width: 100%;
    background: #fff;
    border: 0.5px solid var(--border);
    border-radius: 60px;
    padding: 0 140px 0 28px;
    height: 60px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 300;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: 0 2px 20px rgba(26,26,24,0.06);
  }
  .search-field::placeholder { color: var(--muted); }
  .search-field:focus {
    border-color: var(--sage);
    box-shadow: 0 4px 30px rgba(122,158,135,0.15);
  }

  .search-btn {
    position: absolute;
    right: 6px;
    top: 6px;
    height: 48px;
    padding: 0 24px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    white-space: nowrap;
  }
  .search-btn:hover { background: var(--sage); }
  .search-btn:active { transform: scale(0.97); }
  .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .examples {
    margin-top: 1rem;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }
  .example-chip {
    background: none;
    border: 0.5px solid var(--border);
    border-radius: 50px;
    padding: 5px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 300;
  }
  .example-chip:hover { border-color: var(--sage); color: var(--sage); background: rgba(122,158,135,0.05); }

  /* ── RESULTS SECTION ── */
  #results {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 0 1.5rem 6rem;
    display: none;
  }

  .results-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 0.5px solid var(--border);
  }
  .results-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 400;
  }
  .results-query {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    font-style: italic;
    color: var(--ink);
  }

  /* MAIN CARD */
  .main-card {
    background: #fff;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 2rem;
    box-shadow: 0 4px 40px rgba(26,26,24,0.07);
    animation: rise 0.5s ease both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .main-img-wrap { position: relative; height: 340px; overflow: hidden; background: var(--paper-dark); }
  .main-img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.6s ease;
  }
  .main-card:hover .main-img { transform: scale(1.02); }
  .main-img-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 13px; color: var(--muted);
    background: linear-gradient(135deg, #ede9df 0%, #e0dbd0 100%);
    letter-spacing: 0.05em;
  }

  .card-badge {
    position: absolute;
    top: 16px; left: 16px;
    background: var(--sage);
    color: #fff;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 50px;
    font-weight: 400;
  }

  .main-card-body { padding: 2rem; }
  .card-location {
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 400;
  }
  .card-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 400;
    line-height: 1.1;
    color: var(--ink);
    margin-bottom: 1rem;
  }
  .card-why {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.7;
    font-weight: 300;
    margin-bottom: 1.5rem;
  }

  .card-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-top: 1.25rem;
    border-top: 0.5px solid var(--border);
    flex-wrap: wrap;
  }

  .like-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: 0.5px solid var(--border);
    border-radius: 50px;
    padding: 8px 18px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--muted);
    transition: all 0.2s;
  }
  .like-btn:hover { border-color: var(--rust); color: var(--rust); }
  .like-btn.liked { background: var(--rust); border-color: var(--rust); color: #fff; }
  .like-btn svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0; }

  .more-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    font-size: 13px;
    color: var(--muted);
    transition: color 0.2s;
    font-weight: 300;
  }
  .more-btn:hover { color: var(--ink); }

  /* YOU MIGHT ALSO LIKE */
  .also-section { margin-top: 0.5rem; }
  .also-title {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
    font-weight: 400;
  }
  .also-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  .also-card {
    background: #fff;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    animation: rise 0.4s ease both;
    transition: box-shadow 0.2s;
  }
  .also-card:hover { box-shadow: 0 4px 20px rgba(26,26,24,0.09); }
  .also-img-wrap { height: 130px; overflow: hidden; background: var(--paper-dark); }
  .also-img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s; }
  .also-card:hover .also-img { transform: scale(1.05); }
  .also-img-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--muted); }
  .also-body { padding: 12px; }
  .also-loc { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; font-weight: 400; }
  .also-name { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 400; color: var(--ink); margin-bottom: 4px; line-height: 1.2; }
  .also-likes { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
  .also-likes svg { width: 10px; height: 10px; fill: var(--rust); }

  /* LOADING */
  .loading-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem 0;
    gap: 1rem;
  }
  .loader {
    width: 36px; height: 36px;
    border: 1.5px solid var(--border);
    border-top-color: var(--sage);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-txt {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
  }

  /* ERROR */
  .error-wrap {
    background: rgba(184,92,58,0.06);
    border: 0.5px solid rgba(184,92,58,0.25);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    font-size: 14px;
    color: var(--rust);
    text-align: center;
  }

  /* FOOTER */
  footer {
    position: relative; z-index: 1;
    text-align: center;
    padding: 2rem;
    border-top: 0.5px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    font-weight: 300;
  }

  /* SEASON BAR — footer */
  .footer-season {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; margin-top: 10px; opacity: 0.6;
    transition: opacity 0.2s;
  }
  .footer-season:hover { opacity: 1; }
  .sb-season-name {
    font-size: 10px; color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-weight: 400;
    letter-spacing: 0.06em; white-space: nowrap;
    text-transform: uppercase;
  }
  .sb-track-outer {
    position: relative; height: 14px; flex-shrink: 0;
  }
  .sb-track {
    position: absolute; inset: 2px 0; border-radius: 50px;
    display: flex; overflow: hidden;
    border: 0.5px solid rgba(26,26,24,0.1);
  }
  .sb-seg { flex: 1; }
  .sb-months {
    position: absolute; inset: 0; display: flex; pointer-events: none;
  }
  .sb-month {
    flex: 1; display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .sb-mtick {
    position: absolute; left: 0; top: 3px; bottom: 3px;
    width: 0.5px; background: rgba(255,255,255,0.35);
  }
  .sb-mlabel { display: none; }
  .sb-needle {
    position: absolute; top: -1px; bottom: -1px; width: 1.5px;
    background: var(--ink); border-radius: 2px;
    transform: translateX(-50%);
    transition: left 0.6s cubic-bezier(0.34,1.2,0.64,1);
  }
  .sb-needle::before, .sb-needle::after {
    content: ''; position: absolute; left: 50%;
    transform: translateX(-50%);
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--ink);
  }
  .sb-needle::before { top: -2px; }
  .sb-needle::after  { bottom: -2px; }
  .sb-hemi { display: flex; gap: 2px; }
  .sb-hbtn {
    font-size: 9px; padding: 1px 6px; border-radius: 50px;
    border: 0.5px solid var(--border); color: var(--muted);
    cursor: pointer; background: none;
    font-family: 'DM Sans', sans-serif; transition: all 0.15s;
  }
  .sb-hbtn.on { background: var(--muted); color: var(--paper); border-color: var(--muted); }
  .sb-hbtn:hover:not(.on) { border-color: var(--sage); color: var(--sage); }

  /* ENRICHED CARD */
  .card-mood {
    position: absolute; bottom: 14px; left: 14px;
    font-family: 'Cormorant Garamond', serif; font-size: 13px; font-style: italic;
    color: rgba(255,255,255,0.95); font-weight: 300; pointer-events: none;
    background: rgba(26,26,24,0.62); backdrop-filter: blur(4px);
    padding: 4px 12px; border-radius: 50px;
  }
  .card-img-clickable { cursor: zoom-in; }
  .card-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .card-chip {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--muted);
    background: var(--paper-dark); border-radius: 50px;
    padding: 4px 10px; font-weight: 400; font-family: 'DM Sans', sans-serif;
    line-height: 1.4;
  }
  .card-chip svg { width: 12px; height: 12px; flex-shrink: 0; }
  .info-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 14px 0;
  }
  .info-cell {
    background: var(--paper-dark); border-radius: var(--radius);
    padding: 10px 12px;
  }
  .info-cell-label {
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 3px;
    display: flex; align-items: center; gap: 5px; font-weight: 400;
  }
  .info-cell-label svg { width: 12px; height: 12px; flex-shrink: 0; }
  .info-cell-val { font-size: 13px; color: var(--ink); font-weight: 400; }
  .crowd-wrap { margin-bottom: 14px; }
  .crowd-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-weight: 400; margin-bottom: 5px; }
  .crowd-dots { display: flex; gap: 4px; }
  .crowd-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
  .crowd-dot.on { background: var(--sage); }
  .card-links { display: flex; align-items: center; gap: 14px; }
  .card-link {
    font-size: 12px; color: var(--muted); text-decoration: none;
    display: flex; align-items: center; gap: 4px; transition: color 0.2s;
  }
  .card-link:hover { color: var(--ink); }
  .card-link svg { width: 13px; height: 13px; flex-shrink: 0; }

  /* LIGHTBOX */
  .lightbox {
    position: fixed; inset: 0; background: rgba(26,26,24,0.92);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; cursor: zoom-out; opacity: 0;
    transition: opacity 0.2s ease;
  }
  .lightbox.open { opacity: 1; }
  .lightbox img {
    max-width: 90vw; max-height: 88vh; object-fit: contain;
    border-radius: var(--radius-lg); box-shadow: 0 8px 60px rgba(0,0,0,0.5);
  }
  .lightbox-close {
    position: fixed; top: 20px; right: 24px; color: #fff;
    font-size: 28px; cursor: pointer; opacity: 0.7; transition: opacity 0.2s;
    background: none; border: none; line-height: 1;
  }
  .lightbox-close:hover { opacity: 1; }

  /* PARTICLES */
  .particle {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    opacity: 0;
    font-size: 16px;
    animation: particle-fall 1.8s ease-out forwards;
    will-change: transform, opacity;
  }
  @keyframes particle-fall {
    0%   { opacity: 0; transform: translateY(0) rotate(0deg) scale(0.5); }
    15%  { opacity: 0.9; transform: translateY(-30px) rotate(20deg) scale(1); }
    100% { opacity: 0; transform: translateY(80px) rotate(120deg) scale(0.6); }
  }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    header { padding: 1rem 1.25rem; }
    h1 { font-size: 48px; }
    .main-img-wrap { height: 220px; }
    .main-card-body { padding: 1.25rem; }
    .card-name { font-size: 28px; }
    .also-grid { grid-template-columns: 1fr 1fr; }
    .info-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <a href="/" class="logo">Else<span>where</span></a>
  <div class="lang-selector" id="lang-selector">
    <button class="lang-btn active" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="fr">FR</button>
    <button class="lang-btn" data-lang="es">ES</button>
    <button class="lang-btn" data-lang="de">DE</button>
    <button class="lang-btn" data-lang="it">IT</button>
    <button class="lang-btn" data-lang="pt">PT</button>
    <button class="lang-btn" data-lang="ja">JA</button>
    <button class="lang-btn" data-lang="zh">ZH</button>
    <button class="lang-btn" data-lang="ar">AR</button>
    <button class="lang-btn" data-lang="nl">NL</button>
  </div>
</header>

<!-- SVG Compass rose background -->
<div class="hero" id="hero">
  <svg class="compass-bg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="100" cy="100" r="95" stroke="#1a1a18" stroke-width="0.5"/>
    <circle cx="100" cy="100" r="70" stroke="#1a1a18" stroke-width="0.3"/>
    <circle cx="100" cy="100" r="45" stroke="#1a1a18" stroke-width="0.3"/>
    <circle cx="100" cy="100" r="4" fill="#1a1a18"/>

let currentLang = 'en';

function t(key) { return I18N[currentLang]?.[key] ?? I18N['en'][key]; }

function applyLang(lang) {
  currentLang = lang;
  if (typeof updateSeasonLabel === 'function') updateSeasonLabel();
  document.documentElement.lang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  document.getElementById('txt-eyebrow').textContent = t('eyebrow');
  document.getElementById('txt-h1').innerHTML = t('h1');
  document.getElementById('txt-sub').textContent = t('sub');
  document.getElementById('place-input').placeholder = t('placeholder');
  document.getElementById('txt-btn').textContent = t('btn');
  document.getElementById('txt-footer').textContent = t('footer');
  if (lang === 'ar') document.body.setAttribute('dir', 'rtl');
  else document.body.removeAttribute('dir');
}

document.getElementById('lang-selector').addEventListener('click', e => {
  const btn = e.target.closest('.lang-btn');
  if (btn) applyLang(btn.dataset.lang);
});

const SEA_COLORS = ['#9ec494','#e8c860','#d4845a','#a8c0d8'];

let isNorthernHemisphere = true;
const curMonth = new Date().getMonth();

function getSeasonIdx(m) {
  return (isNorthernHemisphere ? SI_N : SI_S)[m];
}

function getEffectiveMonth() {
  return isNorthernHemisphere ? curMonth : (curMonth + 6) % 12;
}

function buildSeasonBar() {
  const track = document.getElementById('sb-track');
  const monthsEl = document.getElementById('sb-months');
  if (!track || !monthsEl) return;
  track.innerHTML = '';
  monthsEl.innerHTML = '';
  const labels = SB_MONTH_LABELS[currentLang] || SB_MONTH_LABELS['en'];
  for (let m = 0; m < 12; m++) {
    const si = getSeasonIdx(m);
    const seg = document.createElement('div');
    seg.className = 'sb-seg';
    seg.style.background = SEA_COLORS[si];
    seg.style.opacity = m === curMonth ? '1' : '0.72';
    track.appendChild(seg);
    const mEl = document.createElement('div');
    mEl.className = 'sb-month';
    mEl.innerHTML = (m > 0 ? '<div class="sb-mtick"></div>' : '') +
      '<span class="sb-mlabel">' + labels[m] + '</span>';
    monthsEl.appendChild(mEl);
  }
  // Needle position
  const needle = document.getElementById('sb-needle');
  if (needle) needle.style.left = ((curMonth + 0.5) / 12 * 100) + '%';
  // Hemi buttons
  const hn = document.getElementById('h-n');
  const hs = document.getElementById('h-s');
  if (hn) hn.classList.toggle('on', isNorthernHemisphere);
  if (hs) hs.classList.toggle('on', !isNorthernHemisphere);
}

function updateSeasonLabel() {
  const snames = SEASON_NAMES_BAR[currentLang] || SEASON_NAMES_BAR['en'];
  const mnames = MONTH_FULL_BAR[currentLang] || MONTH_FULL_BAR['en'];
  const si = getSeasonIdx(curMonth);
  const el = document.getElementById('sb-season-name');
  if (el) el.textContent = mnames[curMonth] + ' · ' + snames[si];
  buildSeasonBar();
}

function applySeasonTheme() {
  const month = getEffectiveMonth();
  const s = SEASONS[month];
  const root = document.documentElement;
  root.style.setProperty('--season-paper', s.paper);
  root.style.setProperty('--season-paper-dark', s.paperDark);
  root.style.setProperty('--season-accent', s.accent);
  root.style.setProperty('--season-accent-light', s.accentLight);
  root.style.setProperty('--season-muted', s.muted);
  root.style.setProperty('--season-badge-bg', s.badgeBg);
  root.style.setProperty('--season-badge-text', s.badgeText);
  root.style.setProperty('--season-like', s.like);

// ── IN-MEMORY STORE (replace with Google Sheets API in production) ─────────
// Structure: { normalizedQuery: [ { name, city, why, image, google, likes } ] }
const STORE = {};

function normalizeQuery(q) { return q.trim().toLowerCase(); }

function getStored(query) { return STORE[normalizeQuery(query)] || []; }

function upsertSuggestion(query, suggestion) {
  const key = normalizeQuery(query);
  if (!STORE[key]) STORE[key] = [];
  const existing = STORE[key].find(s => s.name.toLowerCase() === suggestion.name.toLowerCase());
  if (existing) return existing;
  const entry = { ...suggestion, likes: 0, liked: false };
  STORE[key].push(entry);
  return entry;
}

function sortByLikes(arr) { return [...arr].sort((a, b) => b.likes - a.likes); }

// ── CLAUDE API ────────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `You are an expert in alternative and sustainable tourism. When given a famous tourist spot, suggest ONE hidden gem alternative that is lesser-known, off the beaten path, and genuinely special.

Rules:
- ONLY suggest truly hidden, secret, or uncrowded places.
- NEVER suggest famous or crowded places.
- Stay in the same city, region, or country as the input.
- Match the experience type (viewpoint, nature, architecture, history, etc).
- The image must be a real, direct URL to an image on Unsplash (https://images.unsplash.com/photo-XXXXXXX?w=800&q=80) or Wikimedia Commons (direct file URL). Use real photo IDs.
- The google link must be: https://www.google.com/search?q=PLACE+NAME+CITY

Respond ONLY with valid JSON, no markdown, no backticks, no preamble:
{
  "name": "Place name",
  "city": "City or region",
  "why": "2-3 sentence explanation of why this is a great alternative and what makes it special",
  "image": "Direct image URL from Unsplash or Wikimedia",
  "google": "https://www.google.com/search?q=..."
}`;

async function fetchSuggestion(query) {
  const existing = getStored(query);
  // If we have highly-liked suggestions, sometimes use them as context
  const contextHint = existing.length > 0
    ? `\n\nAlready suggested for this place: ${existing.map(s => s.name).join(', ')}. Suggest a DIFFERENT hidden gem.`
    : '';

  const res = await fetch('https://elsewhere-suggest.vlabrusse.workers.dev', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ query, contextHint, lang: currentLang })
  });

  if (!res.ok) {
    if (res.status === 429) {
      const data = await res.json().catch(() => ({}));
      const wait = data.retryAfter
        ? (data.reason === 'minute' ? `${data.retryAfter}s` : `${Math.ceil(data.retryAfter/60)} min`)
        : 'a moment';
      const err = new Error(`Too many searches. Please wait ${wait} before trying again.`);
      err.rateLimited = true;
      throw err;
    }
    if (res.status === 422) {
      const data = await res.json().catch(() => ({}));
      const err = new Error(data.message || 'This does not seem to be a tourist destination.');
      err.notAPlace = true;
      throw err;
    }
    throw new Error('API error ' + res.status);
  }
  return res.json();
}

// ── UI ────────────────────────────────────────────────────────────────────
function fillAndSearch(place) {
  document.getElementById('place-input').value = place;
  handleSearch();
}

async function handleSearch() {
  const input = document.getElementById('place-input');
  const btn = document.getElementById('search-btn');
  const query = input.value.trim();
  if (!query) { input.focus(); return; }

  const resultsEl = document.getElementById('results');
  const inner = document.getElementById('results-inner');

  resultsEl.style.display = 'block';
  inner.innerHTML = `<div class="loading-wrap"><div class="loader"></div><p class="loading-txt">${t('loading')}</p></div>`;
  window.scrollTo({ top: document.getElementById('hero').offsetHeight - 80, behavior: 'smooth' });

  btn.disabled = true;

  try {
    // Check store for top liked suggestion first
    const stored = sortByLikes(getStored(query));
    let mainSuggestion;

    if (stored.length > 0 && stored[0].likes > 0) {
      // Use top liked as primary, fetch new one too
      mainSuggestion = stored[0];
      fetchSuggestion(query).then(s => upsertSuggestion(query, s)).catch(() => {});
    } else {
      // Fetch fresh suggestion from Claude
      const fetched = await fetchSuggestion(query);
      mainSuggestion = upsertSuggestion(query, fetched);
    }

    renderResults(query, mainSuggestion);
  } catch(err) {
    const msg = err.rateLimited
      ? err.message
      : err.notAPlace
        ? t('notAPlace')
        : t('errorMsg') + `<br/><small style="opacity:0.7">${err.message}</small>`;
    inner.innerHTML = `<div class="error-wrap">${msg}</div>`;
  }

  btn.disabled = false;
}

function openLightbox(src, alt) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightbox-img');
  img.src = src; img.alt = alt;
  lb.style.display = 'flex';
  requestAnimationFrame(function() { lb.classList.add('open'); });
  document.addEventListener('keydown', closeLightboxOnEsc);
}

function closeLightbox() {
  const lb = document.getElementById('lightbox');
  lb.classList.remove('open');
  setTimeout(function() { lb.style.display = 'none'; }, 200);
  document.removeEventListener('keydown', closeLightboxOnEsc);
}

function closeLightboxOnEsc(e) { if (e.key === 'Escape') closeLightbox(); }

        ${infoItems ? `<div class="info-grid">${infoItems}</div>` : ''}
        ${main.crowd_level ? `<div class="crowd-wrap"><p class="crowd-label">${t('crowd')}</p><div class="crowd-dots">${dots}</div></div>` : ''}
        <div class="card-actions" style="padding-top:12px;border-top:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
          <button class="like-btn ${main.liked ? 'liked' : ''}" id="${mainId}-like" onclick="handleLike('${mainId}', '${encodeURIComponent(query)}', '${encodeURIComponent(main.name)}')">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            <span id="${mainId}-count">${main.likes}</span> ${t('likes')}
          </button>
          <div class="card-links">${links}</div>
        </div>
      </div>
    </div>
    ${alsoHtml}`;

  // Launch seasonal particles after DOM update
  requestAnimationFrame(function() {
    const card = document.querySelector('.main-card');
    if (card) launchParticles(card);
  });
}

function handleLike(cardId, queryEnc, nameEnc) {
  const query = decodeURIComponent(queryEnc);
  const name = decodeURIComponent(nameEnc);
  const key = normalizeQuery(query);
  const entry = STORE[key]?.find(s => s.name === name);
  if (!entry || entry.liked) return;
  entry.liked = true;
  entry.likes++;

  const btn = document.getElementById(cardId + '-like');
  const count = document.getElementById(cardId + '-count');
  if (btn) btn.classList.add('liked');
  if (count) count.textContent = entry.likes;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}


// ── SEASONAL PARTICLES ────────────────────────────────────────────────────────
const SEASON_PARTICLES = {
  winter:  { chars:['❄','❅','❆','·','·'],   colors:['#a8c0d8','#c8dff0','#e0eef8','#7ba8c8','#d0e8f8'] },
  spring:  { chars:['✿','❀','·','°','✦'],   colors:['#d4a0c0','#e8c0d4','#b07898','#f0d0e0','#c890a8'] },
  summer:  { chars:['✦','★','·','✧','°'],   colors:['#e8c860','#f0d880','#c8a840','#f8e898','#dab840'] },
  autumn:  { chars:['◈','·','❧','°','✦'],   colors:['#d4845a','#c06838','#e8a870','#b85030','#f0c090'] },
};

function getCurrentSeason() {
  const m = new Date().getMonth();
  const idx = (isNorthernHemisphere ? SI_N : SI_S)[m];
  return ['spring','summer','autumn','winter'][idx];
}

function launchParticles(originEl) {
  if (!originEl) return;
  const season = getCurrentSeason();
  const { chars, colors } = SEASON_PARTICLES[season];
  const rect = originEl.getBoundingClientRect();
  const count = 18;

  // Spread spawn points across the full card width, not just center
  const spawnPoints = Array.from({ length: count }, (_, i) => ({
    x: rect.left + (rect.width * (0.1 + Math.random() * 0.8)),
    y: rect.top + (rect.height * (0.1 + Math.random() * 0.5)),
  }));

  // Random burst patterns — radial, upward, diagonal, fountain
  const patterns = [
    () => ({ angle: Math.random() * 360, dist: 60 + Math.random() * 120 }),
    () => ({ angle: -90 + (Math.random() - 0.5) * 140, dist: 50 + Math.random() * 100 }),
    () => ({ angle: (Math.random() > 0.5 ? 1 : -1) * (30 + Math.random() * 60), dist: 70 + Math.random() * 80 }),
    () => ({ angle: -80 + (Math.random() - 0.5) * 60, dist: 80 + Math.random() * 140 }),
  ];

  for (let i = 0; i < count; i++) {
    const { x, y } = spawnPoints[i];
    const el = document.createElement('span');
    const color = colors[i % colors.length];
    const size = 9 + Math.random() * 9;
    el.style.cssText = 'position:fixed;pointer-events:none;z-index:9999;opacity:0;will-change:transform,opacity;line-height:1;';
    el.style.fontSize = size + 'px';
    el.style.color = color;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.textContent = chars[Math.floor(Math.random() * chars.length)];
    document.body.appendChild(el);

    const pat = patterns[Math.floor(Math.random() * patterns.length)]();
    const rad = pat.angle * Math.PI / 180;
    const tx = Math.cos(rad) * pat.dist;
    const ty = Math.sin(rad) * pat.dist;
    const delay = Math.random() * 200;       // faster stagger
    const dur = 800 + Math.random() * 500;  // faster animation
    const rotDir = Math.random() > 0.5 ? 1 : -1;
    const rotAmt = 80 + Math.random() * 200;

    (function(el, tx, ty, dur, delay, rotDir, rotAmt) {
      const startTime = performance.now() + delay;
      function frame(now) {
        const elapsed = now - startTime;
        if (elapsed < 0) { requestAnimationFrame(frame); return; }
        const p = Math.min(elapsed / dur, 1);
        const eased = 1 - Math.pow(1 - p, 2);
        const opacity = p < 0.15 ? p / 0.15 : 1 - ((p - 0.15) / 0.85);
        el.style.opacity = Math.max(0, opacity * 0.85);
        el.style.transform = 'translate(' + (tx*eased) + 'px,' + (ty*eased) + 'px) rotate(' + (eased*rotAmt*rotDir) + 'deg) scale(' + (0.4+eased*0.8) + ')';
        if (p < 1) requestAnimationFrame(frame);
        else el.remove();
      }
      requestAnimationFrame(frame);
    })(el, tx, ty, dur, delay, rotDir, rotAmt);
  }
}

document.getElementById('search-btn').addEventListener('click', handleSearch);
document.getElementById('examples-row').addEventListener('click', e => {
  const chip = e.target.closest('.example-chip');
  if (chip) fillAndSearch(chip.dataset.place);
});
document.getElementById('place-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSearch();
});
